  name: Build & Release MockMate

  on:
    push:
      tags:
        - 'v*.*.*'
    workflow_dispatch:
      inputs:
        tag:
          description: 'Release tag to create (e.g. v1.0.1)'
          required: true
          default: 'v1.0.1'

  permissions:
    contents: write

  jobs:
    build:
      strategy:
        matrix:
          include:
            - os: ubuntu-latest
              platform: linux
              artifact: |
                release/*.AppImage
                release/*.yml
            - os: windows-latest
              platform: win
              artifact: |
                release/*.exe
                release/*.yml
                release/*.blockmap
            - os: macos-latest
              platform: mac
              artifact: |
                release/*.dmg
                release/*.yml

      runs-on: ${{ matrix.os }}

      steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Setup Node.js 20
          uses: actions/setup-node@v4
          with:
            node-version: 20
            cache: npm

        - name: Install dependencies
          run: npm install

        - name: Build frontend (Vite)
          run: npm run build

        - name: Build Electron installer (${{ matrix.platform }})
          run: npx electron-builder --${{ matrix.platform }} --publish never
          env:
            CSC_IDENTITY_AUTO_DISCOVERY: false

        - name: Upload installers to GitHub Release
          uses: softprops/action-gh-release@v2
          with:
            draft: false
            prerelease: false
            generate_release_notes: true
            tag_name: ${{ github.event.inputs.tag || github.ref_name }}
            files: |
              ${{ matrix.artifact }}
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
