<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MockMate — Reset password</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0a0a0e; --paper:#16161d; --line:rgba(255,255,255,0.08); --line2:rgba(255,255,255,0.14);
    --t1:rgba(255,255,255,0.92); --t2:rgba(255,255,255,0.55); --t3:rgba(255,255,255,0.35);
    --accent:#8b5cf6; --accent-deep:#7c3aed; --grad:linear-gradient(135deg,#7c3aed,#f97316);
    --ok:#4ade80; --bad:#fb7185;
    --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,system-ui,sans-serif;
  }
  body{
    font-family:var(--font);color:var(--t1);-webkit-font-smoothing:antialiased;min-height:100vh;
    display:flex;align-items:center;justify-content:center;padding:24px;
    background:radial-gradient(800px 460px at 20% 0%,rgba(124,58,237,0.16),transparent 60%),var(--bg);
  }
  .card{width:100%;max-width:400px;background:var(--paper);border:1px solid var(--line);border-radius:16px;padding:30px;box-shadow:0 30px 70px -20px rgba(0,0,0,.6)}
  .brand{display:flex;align-items:center;gap:9px;margin-bottom:18px}
  .mark{width:26px;height:26px;border-radius:8px;background:var(--grad);display:grid;place-items:center}
  .brand b{font-size:14px;font-weight:600}
  h1{font-size:20px;font-weight:650;margin-bottom:6px}
  .sub{font-size:13px;color:var(--t2);line-height:1.5;margin-bottom:18px}
  label{display:block;font-size:11px;font-weight:500;color:var(--t2);margin-bottom:6px}
  input{width:100%;height:42px;padding:0 12px;margin-bottom:13px;background:var(--bg);border:1px solid var(--line2);border-radius:10px;color:var(--t1);font-size:14px;font-family:inherit;outline:none;transition:border-color .15s}
  input:focus{border-color:var(--accent)}
  .btn{width:100%;height:44px;border:none;border-radius:10px;background:var(--grad);color:#fff;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;transition:transform .15s,box-shadow .15s,opacity .15s}
  .btn:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 12px 28px -10px rgba(124,58,237,.6)}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .msg{font-size:13px;min-height:18px;margin-bottom:4px}
  .msg.err{color:var(--bad)}
  .msg.ok{color:var(--ok)}
  .foot{margin-top:16px;text-align:center;font-size:13px}
  .foot a{color:var(--accent);text-decoration:none}
  .center-state{text-align:center}
  .center-state .icon{width:48px;height:48px;border-radius:50%;display:grid;place-items:center;margin:0 auto 14px}
</style>
</head>
<body>
  <div class="card">
    <div class="brand"><span class="mark"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19V6.5a1 1 0 0 1 1.8-.6L12 14l6.2-8.1a1 1 0 0 1 1.8.6V19"/></svg></span><b>MockMate</b></div>

    <!-- form (valid token) -->
    <div id="form-view">
      <h1>Set a new password</h1>
      <p class="sub">Choose a new password for your account. This link works once and expires in 30 minutes.</p>
      <label for="pw">New password</label>
      <input id="pw" type="password" placeholder="At least 8 characters" autocomplete="new-password" />
      <label for="pw2">Confirm password</label>
      <input id="pw2" type="password" placeholder="Re-enter password" autocomplete="new-password" />
      <div class="msg err" id="err"></div>
      <button class="btn" id="submit" type="button">Reset password</button>
    </div>

    <!-- success / error states -->
    <div id="done-view" class="center-state" style="display:none">
      <div class="icon" id="done-icon"></div>
      <h1 id="done-title"></h1>
      <p class="sub" id="done-sub" style="margin-bottom:6px"></p>
      <div class="foot" id="done-foot"></div>
    </div>
  </div>

  <script src="auth-web.js"></script>
  <script>
  (function () {
    var $ = function (id) { return document.getElementById(id); };
    var token = new URLSearchParams(location.search).get('token');   // reset token from the email link

    function showDone(ok, title, sub, footHTML) {
      $('form-view').style.display = 'none';
      var dv = $('done-view'); dv.style.display = 'block';
      $('done-icon').style.background = ok ? 'rgba(74,222,128,0.14)' : 'rgba(251,113,133,0.14)';
      $('done-icon').innerHTML = ok
        ? '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#4ade80" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>'
        : '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fb7185" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 8v5M12 17h.01"/><circle cx="12" cy="12" r="9"/></svg>';
      $('done-title').textContent = title;
      $('done-sub').textContent = sub;
      $('done-foot').innerHTML = footHTML || '';
    }

    if (!token) {
      showDone(false, 'Invalid reset link', 'This link is missing its token. Request a new one from the sign-in screen.', '<a href="landing.html">← Back to MockMate</a>');
      return;
    }

    $('submit').addEventListener('click', async function () {
      var pw = $('pw').value, pw2 = $('pw2').value;
      $('err').textContent = '';
      if (pw.length < 8) { $('err').textContent = 'Password must be at least 8 characters'; return; }
      if (pw !== pw2) { $('err').textContent = 'Passwords don’t match'; return; }
      var btn = $('submit'); btn.disabled = true; btn.textContent = 'Resetting…';
      try {
        var data = await MMAuth.api('/auth/reset-password', { method: 'POST', body: { token: token, password: pw } });
        if (data && data.token) MMAuth.setToken(data.token);   // backend returns a JWT → log them straight in
        showDone(true, 'Password updated', 'You’re signed in. Redirecting to your dashboard…', '<a href="dashboard.html">Go to dashboard →</a>');
        setTimeout(function () { location.href = 'dashboard.html'; }, 1600);
      } catch (e) {
        $('err').textContent = e.network ? 'Can’t reach the server. Try again in a moment.' : (e.message || 'Could not reset your password.');
        btn.disabled = false; btn.textContent = 'Reset password';
      }
    });
    ['pw', 'pw2'].forEach(function (id) { $(id).addEventListener('keydown', function (e) { if (e.key === 'Enter') $('submit').click(); }); });
  })();
  </script>
</body>
</html>
